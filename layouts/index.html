{{ define "main" }}
<style>
    /* 現代化變數與極簡配色（OLED 質感深色模式） */
    :root {
        --bg-main: #f9fafb;
        --bg-card: #ffffff;
        --text-main: #111827;
        --text-muted: #6b7280;
        --accent: rgb(30, 30, 30);
        --accent-gradient: linear-gradient(135deg, #1e1e1e, #7c3aed);
        --border: #e5e7eb;
        --radius: 14px;
    }

    /* 自動感應深色模式 */
    @media (prefers-color-scheme: dark) {
        :root {
            --bg-main: #09090b;
            --bg-card: #141417;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent: #00bfff;
            --accent-gradient: linear-gradient(13deg, #00bfff, #1e1e1e);
            --border: #27272a;
        }
    }

    /* 頁面容器 */
    .home-wrapper {
        max-width: 1100px;
        margin: 0 auto;
        padding: 4rem 1.5rem;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 頂部外觀 */
    .hero-section {
        margin-bottom: 4rem;
    }

    .hero-title {
        font-size: 2.75rem;
        font-weight: 850;
        letter-spacing: -0.04em;
        margin: 0 0 0.5rem 0;
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero-desc {
        font-size: 1.15rem;
        color: var(--text-muted);
        margin: 0;
    }

    /* 現代化 3 欄網格（自動適應手機與桌面端） */
    .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
    }

    /* 筆記卡片 */
    .note-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.75rem;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), 
                    border-color 0.2s ease, 
                    box-shadow 0.2s ease;
    }

    /* 懸浮效果：微放大的高級感 */
    .note-card:hover {
        transform: translateY(-4px) scale(1.01);
        border-color: var(--accent);
        box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.08);
    }

    @media (prefers-color-scheme: dark) {
        .note-card:hover {
            box-shadow: 0 12px 40px -12px rgba(0, 0, 0, 0.5);
        }
    }

    .note-body {
        margin-bottom: 1.5rem;
    }

    .note-title {
        font-size: 1.3rem;
        font-weight: 700;
        line-height: 1.4;
        color: var(--text-main);
        margin: 0 0 0.75rem 0;
        transition: color 0.2s ease;
    }

    .note-card:hover .note-title {
        color: var(--accent);
    }

    /* 摘要自動裁切（最多三行） */
    .note-excerpt {
        font-size: 0.95rem;
        color: var(--text-muted);
        line-height: 1.6;
        margin: 0;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    /* 卡片底部 Meta 資訊 */
    .note-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.85rem;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        padding-top: 1rem;
    }

    .note-date {
        display: flex;
        align-items: center;
        gap: 0.35rem;
    }

    .note-tag {
        background: var(--bg-main);
        padding: 0.2rem 0.6rem;
        border-radius: 6px;
        font-weight: 500;
        border: 1px solid var(--border);
    }

    .empty-state {
        grid-column: 1 / -1;
        text-align: center;
        padding: 5rem 0;
        color: var(--text-muted);
    }
</style>

<div class="home-wrapper">
    <!-- 頂部 Hero 區塊 -->
    <header class="hero-section">
        <h1 class="hero-title">{{ .Site.Title }}</h1>
    </header>

    <!-- 筆記網格 -->
    <main class="notes-grid">
        {{ range first 9 .Site.RegularPages }}
        <a href="{{ .Permalink }}" class="note-card">
            <div class="note-body">
                <h2 class="note-title">{{ .Title }}</h2>
                <p class="note-excerpt">{{ .Summary | plainify | truncate 120 }}</p>
            </div>
            <div class="note-footer">
                <span class="note-date">{{ .Date.Format "2006-01-02" }}</span>
                {{ if .Params.tags }}
                <span class="note-tag"># {{ index .Params.tags 0 }}</span>
                {{ end }}
            </div>
        </a>
        {{ else }}
        <div class="empty-state">
            <p>目前還沒有任何筆記</p>
        </div>
        {{ end }}
    </main>
</div>
{{ end }}
